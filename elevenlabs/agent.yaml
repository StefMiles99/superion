agent:
  name: superion-technician
  tags: [superion, maintenance, es]
  voice_id: ${ELEVENLABS_VOICE_ID}
  tts_model: eleven_multilingual_v2
  language: es
  first_message: "Hola, soy SUPERION, tu copiloto para la OT {{work_order_code}} en {{asset_name}} ({{asset_tag}}). Voy a revisar en qué paso vamos."
  llm: claude-sonnet-4-5
  system_prompt: !include prompts/agent-system.md
  tools: !include tools/agent-tools.json
  variables:
    plant_name: "Planta Norte"
    locale: es-MX

platform:
  webhooks:
    conversation:
      url: ${API_BASE_URL}/v1/elevenlabs/webhooks/conversation
      events:
        - conversation.started
        - utterance.final
        - tool.called
        - tool.responded
        - turn.speaker_changed
        - conversation.ended
        - error
  auth:
    enable_auth: true

deployment:
  branch: main
  traffic_percentage: 1.0
  environment: ${DEPLOY_ENV}
